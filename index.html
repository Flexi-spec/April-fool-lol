<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OEPAT | Sentient Brewing</title>
    <style>
        :root { --primary: #6f4e37; --bg: #fdf5e6; }
        body { font-family: 'Courier New', Courier, monospace; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; border: 3px solid var(--primary); padding: 40px; background: white; box-shadow: 10px 10px 0px var(--primary); max-width: 500px; }
        
        #teapot-visual { font-size: 80px; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .brewing #teapot-visual { animation: shake 0.1s infinite; }
        
        button { 
            position: relative; padding: 15px 30px; font-weight: bold; cursor: pointer;
            background: var(--primary); color: white; border: none; font-family: inherit;
        }

        #error-log { margin-top: 20px; color: #d9534f; font-size: 0.9rem; text-align: left; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -1px); } }
    </style>
</head>
<body>

<div class="container">
    <div id="teapot-visual">🫖</div>
    <h2>OEPAT v1.0</h2>
    <p>Hyper Text Coffee Pot Control Protocol</p>
    
    <div style="height: 100px;">
        <button id="brew-btn">INITIALIZE BREW</button>
    </div>

    <div id="status-display">Status: 200 OK (Idle)</div>
    <div id="error-log"></div>
</div>

<script>
    const btn = document.getElementById('brew-btn');
    const visual = document.getElementById('teapot-visual');
    const status = document.getElementById('status-display');
    const log = document.getElementById('error-log');

    // 1. THE "SOCIAL DISTANCING" BUTTON
    // Moves the button away from the mouse unless you're fast enough
    document.addEventListener('mousemove', (e) => {
        const btnRect = btn.getBoundingClientRect();
        const dist = Math.hypot(e.clientX - (btnRect.left + btnRect.width/2), e.clientY - (btnRect.top + btnRect.height/2));
        
        if (dist < 80) {
            btn.style.left = `${Math.random() * 50 - 25}px`;
            btn.style.top = `${Math.random() * 50 - 25}px`;
        }
    });

    // 2. THE HTCPCP "BREW" REQUEST
    btn.addEventListener('click', async () => {
        document.body.classList.add('brewing');
        status.innerText = "Status: 102 PROCESSING (Judging your tastes...)";
        
        try {
            // In a real April Fools deployment, you'd point this to your Gemini-powered API
            const response = await fetch('/brew', {
                method: 'POST', // Technically should be 'BREW' per RFC 2324!
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ beverage: 'coffee', device: 'teapot' })
            });

            if (response.status === 418) {
                const data = await response.json();
                handleTeapotError(data);
            }
        } catch (err) {
            // Mocking the response for the demo
            setTimeout(() => {
                handleTeapotError({
                    message: "418 I'M A TEAPOT",
                    reasoning: "AI ANALYSIS: Your request for 'Dark Roast' has been flagged as pretentious. Furthermore, I am made of porcelain, not stainless steel. I refuse to cooperate with bean-water."
                });
            }, 2000);
        }
    });

    function handleTeapotError(data) {
        document.body.classList.remove('brewing');
        visual.style.transform = "rotate(-45deg)"; // The teapot "pours" nothing
        status.innerText = `Status: ${data.message}`;
        log.innerHTML = `<strong>Gemini Brew Logic:</strong> <br> ${data.reasoning}`;
        btn.innerText = "TRY AGAIN (YOU WON'T)";
    }
</script>

</body>
</html>
